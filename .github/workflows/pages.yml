name: Refresh reports and publish Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "25 6 * * 6"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Cache downloaded market data
        uses: actions/cache@v4
        with:
          path: data/raw
          key: market-data-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            market-data-${{ runner.os }}-

      - name: Refresh reports
        run: bash refresh_reports.sh

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp index.html report_view.html portfolio_import.html rebalance_strategy.html README.md _site/
          cp -r reports _site/reports
          mkdir -p _site/data
          cp -r data/processed _site/data/processed

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
